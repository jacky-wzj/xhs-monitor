      --text-dim: #888;
      --accent: #ff6b35;
      --red: #ff4757;
      --red-bg: rgba(255, 71, 87, 0.08);

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {

      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;

      margin: 0 auto;
    }
    .header {
      text-align: center;
      padding: 30px 0;

    .header h1 { font-size: 1.8em; color: var(--red); margin-bottom: 8px; }

    .neg-card {

      flex-shrink: 0;
      margin-top: 2px;
    }
    .neg-title h3 { font-size: 1.1em; }
    .neg-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.85em; align-items: center; }
    .neg-meta .author { color: var(--accent); }
    .neg-meta .likes { color: var(--red); }
    .neg-meta .date { color: var(--text-dim); }
    .neg-meta a { color: var(--accent); text-decoration: none; font-size: 0.85em; }
    .neg-meta a:hover { text-decoration: underline; }
    .keyword-tag {
      background: rgba(255, 107, 53, 0.15);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8em;
    }
    .post-content { padding: 16px; }
    .negative-post { background: var(--red-bg); }
    .negative-badge {
      font-size: 0.85em;
      font-weight: 600;
      color: var(--red);
      margin-bottom: 8px;
    }
    .context-badge {
      font-size: 0.85em;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .ai-reason {
      font-size: 0.85em;
      color: var(--accent);
      margin: 6px 0;
      padding: 4px 8px;
      background: rgba(255, 107, 53, 0.08);
      border-radius: 4px;
      border-left: 3px solid var(--accent);
    }
    .post-content p { color: var(--text-dim); font-size: 0.9em; line-height: 1.7; }
    .negative-comments { padding: 16px; border-top: 1px solid var(--card-border); }
    .neg-comment {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
    }
    .normal-comment {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
    }
    .neg-label {
      color: var(--red);
      font-size: 0.8em;
      font-weight: 600;
    }
    .neg-comment-header {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
      font-size: 0.85em;
    }
    .comment-author { color: var(--accent); font-weight: 500; }
    .comment-time { color: var(--text-dim); }
    .comment-likes { color: var(--text-dim); }
    .comment-body { font-size: 0.9em; color: var(--text); line-height: 1.6; }
    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .no-data-icon { font-size: 3em; margin-bottom: 16px; }
    .no-data h2 { color: var(--green); margin-bottom: 8px; }
    .footer {
      text-align: center;
      padding: 30px 0;
      color: var(--text-dim);
      font-size: 0.8em;
      border-top: 1px solid var(--card-border);
      margin-top: 30px;
    }
    @media (max-width: 600px) {
      body { padding: 10px; }
      .header h1 { font-size: 1.4em; }
    }
  </style>
</head>
